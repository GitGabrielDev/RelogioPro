<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio Pro</title>

<!-- 🔗 MANIFEST (PWA) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<!-- iOS support (opcional mas bom pro PWA) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
}

header{
text-align:center;
padding:18px;
font-size:24px;
background:#1c1c1c;
font-weight:bold;
}

.tabs{
display:flex;
}

.tabs button{
flex:1;
padding:14px;
border:0;
background:#222;
color:#fff;
font-size:14px;
cursor:pointer;
}

.tabs button.active{
background:#333;
}

.page{
display:none;
padding:20px;
}

.page.active{
display:block;
}

.big{
font-size:48px;
text-align:center;
font-weight:bold;
}

.center{
text-align:center;
margin-top:10px;
}

button.action{
padding:10px 15px;
margin:5px;
border:0;
border-radius:8px;
background:#2f7fff;
color:#fff;
cursor:pointer;
}

button.danger{
background:#ff4444;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:0;
}
</style>
</head>

<body>

<header>🕒 Relógio Pro</header>

<div class="tabs">
<button class="active" onclick="openTab('clock',this)">Relógio</button>
<button onclick="openTab('timer',this)">Timer</button>
<button onclick="openTab('stopwatch',this)">Cronômetro</button>
</div>

<!-- CLOCK -->
<div id="clock" class="page active">
<div id="time" class="big">--:--:--</div>
<div id="date" class="center"></div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
<input id="minutes" type="number" placeholder="Minutos">
<div id="timerDisplay" class="big">00:00.000</div>

<div class="center">
<button class="action" onclick="startTimer()">Iniciar</button>
<button class="action" onclick="pauseTimer()">Pausar</button>
<button class="action danger" onclick="resetTimer()">Resetar</button>
</div>
</div>

<!-- STOPWATCH -->
<div id="stopwatch" class="page">
<div id="sw" class="big">00:00.000</div>

<div class="center">
<button class="action" onclick="startSW()">Start</button>
<button class="action" onclick="pauseSW()">Pause</button>
<button class="action danger" onclick="resetSW()">Reset</button>
</div>
</div>

<script>

/* =========================
   PWA SERVICE WORKER
========================= */
if ("serviceWorker" in navigator) {
window.addEventListener("load", () => {
navigator.serviceWorker.register("sw.js")
.then(() => console.log("SW registrado"))
.catch(err => console.log("Erro SW:", err));
});
}

/* =========================
   TAB SYSTEM
========================= */
function openTab(id,btn){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
btn.classList.add("active");
}

/* =========================
   CLOCK
========================= */
function updateClock(){
const d = new Date();

document.getElementById("time").textContent =
d.toLocaleTimeString("pt-BR");

document.getElementById("date").textContent =
d.toLocaleDateString("pt-BR",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
setInterval(updateClock,1000);
updateClock();

/* =========================
   FORMATADOR
========================= */
function formatTime(ms){
let totalSec = ms / 1000;
let m = Math.floor(totalSec / 60);
let s = Math.floor(totalSec % 60);
let msPart = Math.floor(ms % 1000);

return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(msPart).padStart(3,"0")}`;
}

/* =========================
   TIMER
========================= */
let timerRunning = false;
let timerStart = 0;
let timerDuration = 0;
let timerRAF;

function updateTimer(){
if(!timerRunning) return;

let now = performance.now();
let remaining = timerDuration - (now - timerStart);

if(remaining <= 0){
document.getElementById("timerDisplay").textContent = "00:00.000";
timerRunning = false;
alert("Tempo acabou!");
return;
}

document.getElementById("timerDisplay").textContent = formatTime(remaining);
timerRAF = requestAnimationFrame(updateTimer);
}

function startTimer(){
if(timerRunning) return;

let input = parseInt(document.getElementById("minutes").value || 0);
timerDuration = input * 60000;

timerStart = performance.now();
timerRunning = true;
updateTimer();
}

function pauseTimer(){
timerRunning = false;
cancelAnimationFrame(timerRAF);
}

function resetTimer(){
timerRunning = false;
cancelAnimationFrame(timerRAF);
document.getElementById("timerDisplay").textContent = "00:00.000";
}

/* =========================
   STOPWATCH
========================= */
let swRunning = false;
let swStart = 0;
let swElapsed = 0;
let swRAF;

function updateSW(){
if(!swRunning) return;

let now = performance.now();
let total = swElapsed + (now - swStart);

document.getElementById("sw").textContent = formatTime(total);

swRAF = requestAnimationFrame(updateSW);
}

function startSW(){
if(swRunning) return;

swRunning = true;
swStart = performance.now();
updateSW();
}

function pauseSW(){
if(!swRunning) return;

swRunning = false;
swElapsed += performance.now() - swStart;
cancelAnimationFrame(swRAF);
}

function resetSW(){
swRunning = false;
swElapsed = 0;
cancelAnimationFrame(swRAF);
document.getElementById("sw").textContent = "00:00.000";
}

</script>

</body>
</html>
